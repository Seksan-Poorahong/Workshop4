<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <button>Check</button>
        <script>
            const btn = document.querySelector("button");
            btn.addEventListener("click",function() {
                alert("ยินดีต้อนรับ")
            });
            btn.addEventListener("mouseover",() => {
                btn.style.backgroundColor="lightblue";
            });
            btn.addEventListener("mouseout",() =>   {
            btn.style.backgroundColor="";
            });
        </script>
    </body>
</html>
